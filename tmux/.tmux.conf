# Terminal & colors
set -g default-shell /bin/zsh
set -g default-command ""
set -g default-terminal "tmux-256color"
set -gq allow-passthrough on
set-option -gas terminal-overrides "*:Tc"
set-option -gas terminal-overrides "*:RGB"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# General
set -g mouse on
set -g history-limit 10000
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g xterm-keys on
set -s escape-time 0
set -g status-interval 1
set -g extended-keys on
set -g extended-keys-format csi-u
set -g focus-events on

# Quiet
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# Mouse scroll into copy-mode
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"

# Mouse selection: copy to clipboard without leaving copy-mode
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe "pbcopy"

# --- Prefix: Ctrl-t ---
unbind C-b
set-option -g prefix C-t
bind-key C-t send-prefix

# --- Normal mode (no prefix) ---
# Alt 1-9: switch windows
bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5
bind-key -n M-6 select-window -t 6
bind-key -n M-7 select-window -t 7
bind-key -n M-8 select-window -t 8
bind-key -n M-9 select-window -t 9

# Alt t: new window
bind-key -n M-t new-window -c "#{pane_current_path}"

# Alt j/k: cycle panes preserving zoom
bind-key -n M-j select-pane -Zt :.+
bind-key -n M-k select-pane -Zt :.-

set -g main-pane-width 50%

# Alt Enter: new pane with main-vertical layout
bind-key -n M-Enter split-window -c "#{pane_current_path}" \; select-layout main-vertical

# Alt f: toggle zoom
bind-key -n M-f resize-pane -Z

# Alt s: toggle between main-vertical and tiled
bind-key -n M-s if-shell '[ "#{@layout}" = "tiled" ]' \
  'select-layout main-vertical ; set -w @layout main-vertical' \
  'select-layout tiled ; set -w @layout tiled'

bind-key -n M-g display-popup -d "#{pane_current_path}" -xC -yC -w 90% -h 90% -E "jjui"

# --- Prefix mode ---
# Resize with H/J/K/L
bind-key H resize-pane -L 5
bind-key J resize-pane -D 5
bind-key K resize-pane -U 5
bind-key L resize-pane -R 5

# Copy mode
bind-key [ copy-mode

# New window
bind-key c new-window -c "#{pane_current_path}"

# Detach
bind-key d detach-client

# Rename window
bind-key r command-prompt -I "#W" "rename-window '%%'"

# Directional pane focus
bind-key h select-pane -LZ
bind-key j select-pane -DZ
bind-key k select-pane -UZ
bind-key l select-pane -RZ

# New pane
bind-key n split-window -c "#{pane_current_path}" \; select-layout main-vertical

# Close pane
bind-key x kill-pane

# Zoom
bind-key z resize-pane -Z

# Split shortcuts
bind-key / split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Reload config
bind-key R source-file ~/.tmux.conf \; display-message "Config reloaded"

# --- Scroll mode keys (vi-style in copy-mode) ---
setw -g mode-keys vi
bind-key -T copy-mode-vi j send-keys -X cursor-down
bind-key -T copy-mode-vi k send-keys -X cursor-up
bind-key -T copy-mode-vi d send-keys -X halfpage-down
bind-key -T copy-mode-vi u send-keys -X halfpage-up

# --- Colors ---
color_gray="#202020"
color_red="#ff9492"
color_green="#26cd4d"
color_yellow="#f0b72f"
color_blue="#71b7ff"
color_magenta="#cb9eff"
color_cyan="#39c5cf"
color_white="#d9dee3"
color_gray_light="#4d4d4d"
color_red_light="#ffb1af"
color_green_light="#4ae168"
color_yellow_light="#f7c843"
color_blue_light="#91cbff"
color_magenta_light="#dbb7ff"
color_cyan_light="#56d4dd"
color_white_light="#ffffff"

color_tab_bg=$color_gray
color_tab_active=$color_yellow_light
color_tab_inactive=$color_cyan_light

color_border_active=$color_cyan_light
color_border_inactive=$color_gray_light

# --- Status line ---
set -g status on
set -g status-position bottom
set -g status-style "bg=default,fg=#cad3f5"
set -g status-justify left
set -g status-right "#[bg=default,fg=#494d64] #S "
set -g status-right-length 50

set -g status-left ""

# Window/tab format (inactive): teal index, teal name on dark gray
setw -g window-status-format "#[bg=default,fg=$color_tab_inactive]#[bg=$color_tab_inactive,fg=$color_tab_bg,bold]#I #[bg=$color_tab_bg,fg=$color_tab_inactive,bold] #W #[bg=default,fg=$color_tab_bg]"
# Window/tab format (active): yellow index, yellow name on dark gray
setw -g window-status-current-format "#[bg=default,fg=$color_tab_active]#[bg=$color_tab_active,fg=$color_tab_bg,bold]#I #[bg=$color_tab_bg,fg=$color_tab_active,bold] #W #[bg=default,fg=$color_tab_bg]"
setw -g window-status-separator " "

# Pane borders
set -g pane-border-style fg=$color_border_inactive
set -g pane-active-border-style fg=$color_border_active
set -g pane-border-status top
set -g pane-border-format "#{?window_zoomed_flag,#[fg=$color_border_active]#[bg=$color_border_active]#[fg=#1e2030]#[bold] FULLSCREEN #[fg=$color_border_active]#[bg=default],} [#P/#{window_panes}] #T "
set -g pane-border-indicators both
set -g pane-border-lines single

# Message style
set -g message-style "fg=#8bd5ca,bg=#363a4f"
set -g message-command-style "fg=#8bd5ca,bg=#363a4f"

# Clock
setw -g clock-mode-colour "#8bd5ca"
